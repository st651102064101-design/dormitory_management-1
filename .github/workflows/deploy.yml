name: CD - Deploy to Domain

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        
        # Add host to known_hosts
        ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} 2>/dev/null >> ~/.ssh/known_hosts || true
        ssh-keyscan -H -p ${{ secrets.DEPLOY_SSH_PORT }} ${{ secrets.DEPLOY_HOST }} 2>/dev/null >> ~/.ssh/known_hosts || true
        
    - name: Deploy to server
      env:
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      run: |
        echo "🚀 Starting deployment to ${{ secrets.DEPLOY_HOST }}"
        
        # Deploy using SSH
        ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.DEPLOY_SSH_PORT }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
          set -e
          
          DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
          
          echo "📁 Deployment directory: $DEPLOY_DIR"
          
          # Navigate to project
          if [ -d "$DEPLOY_DIR" ]; then
            cd "$DEPLOY_DIR"
            echo "📥 Updating existing project..."
            git fetch origin main
            git checkout main
            git reset --hard origin/main
          else
            echo "📁 Creating new project directory..."
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            git clone https://github.com/st651102064101-design/dormitory_management-1.git .
          fi
          
          echo "🔧 Setting permissions..."
          chmod -R 755 .
          find . -type f -name "*.php" -exec chmod 644 {} \;
          
          # Make upload directories writable
          mkdir -p Public/Assets/Images/Payments
          chmod -R 777 Public/Assets/Images 2>/dev/null || true
          
          echo "🧹 Cleaning cache..."
          [ -d "cache" ] && rm -rf cache/* || true
          
          echo "✅ Deployment completed!"
          echo "📊 Current branch: $(git branch --show-current)"
          echo "📝 Latest commit: $(git log -1 --oneline)"
          echo "🌐 Access at: https://${{ secrets.DEPLOY_DOMAIN }}"
        EOF
        
    - name: Verify Deployment
      run: |
        echo "✅ Deployment successful!"
        echo ""
        echo "🌐 Your application is now live at:"
        echo "   https://${{ secrets.DEPLOY_DOMAIN }}"
        echo ""
        echo "📊 Deployment Details:"
        echo "   Server: ${{ secrets.DEPLOY_HOST }}"
        echo "   Path: ${{ secrets.DEPLOY_PATH }}"
        echo "   Branch: main"
        
    - name: Cleanup
      if: always()
      run: |
        rm -f ~/.ssh/deploy_key
        rm -f ~/.ssh/known_hosts
