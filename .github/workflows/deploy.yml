name: CD - Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build Release Package
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        
    - name: Build release package
      run: |
        echo "📦 Building release package..."
        
        # Create release directory
        mkdir -p release
        RELEASE_DIR="./release"
        PROJECT_NAME="dormitory_management"
        VERSION=$(date +%Y%m%d-%H%M%S)
        PACKAGE_NAME="${PROJECT_NAME}-${VERSION}.zip"
        
        echo "📋 Copying project files..."
        # Copy files excluding dev/hidden files
        rsync -av \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='node_modules' \
          --exclude='vendor' \
          --exclude='*.md' \
          --exclude='.gitignore' \
          --exclude='deploy_key*' \
          --exclude='.env*' \
          . $RELEASE_DIR/$PROJECT_NAME/
        
        echo "📦 Creating package: $PACKAGE_NAME"
        cd $RELEASE_DIR
        zip -r "$PACKAGE_NAME" $PROJECT_NAME
        cd ..
        
        echo "✅ Package created: $PACKAGE_NAME"
        ls -lh "$RELEASE_DIR/$PACKAGE_NAME"
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        
    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./release/dormitory_management-*.zip
        asset_name: dormitory_management-release.zip
        asset_content_type: application/zip
        
    - name: Post Build Summary
      run: |
        echo "✅ Build Summary"
        echo "================"
        echo "Project: Dormitory Management System"
        echo "Branch: ${{ github.ref }}"
        echo "Commit: ${{ github.sha }}"
        echo ""
        echo "📦 Release packages created in ./release/"
        echo "💾 Ready for local deployment via XAMPP"
